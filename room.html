<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Doen of Waarheid – Kamer</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="center">

<div class="card gameCard">
  <h1>🎮 Doen of Waarheid</h1>

  <div id="status">Verbinden met lobby...</div>

  <div id="choiceButtons" class="hidden">
    <button id="truthBtn" class="primary">Waarheid</button>
    <button id="dareBtn" class="danger">Doen</button>
  </div>

  <div id="inputArea" class="hidden">
    <input id="inputBox" placeholder="Typ hier..." />
    <button id="sendBtn" class="primary">Versturen</button>
  </div>

</div>

<script type="module" src="game.js"></script>
</body>
</html>
