<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Game Room</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="roomGrid">

  <div class="card">
    <h2>Spelers</h2>
    <ul id="players"></ul>
    <button id="startBtn" class="primary">Start spel</button>
  </div>

  <div id="game" class="card gameCard" style="display:none">

    <h2>Beurt</h2>

    <div class="choiceButtons">
      <button id="truth" class="truthBtn">Waarheid</button>
      <button id="dare" class="dareBtn">Doen</button>
    </div>

    <div id="truthArea">
      <button id="random1"></button>
      <button id="random2"></button>

      <input id="answerInput" placeholder="Typ antwoord">
      <button id="sendAnswer">Verstuur</button>

      <button id="continueBtn">Volgende beurt</button>
    </div>

  </div>

</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
