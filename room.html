<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Game Room</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="card">

  <div class="topbar">
    <span id="lobbyIDText"></span>
    <button id="copyBtn">📋 Copy</button>
  </div>

  <h2 id="lobbyName"></h2>

  <ul id="players"></ul>

  <button id="startBtn">Start Game</button>

  <div id="game" style="display:none">

    <h2 id="turn"></h2>

    <button id="truth">Waarheid</button>
    <button id="dare">Doen</button>

  </div>

</div>

<script type="module" src="js/game.js"></script>
</body>
</html>
