<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Futuristic Checklist</title>

<style>
*{box-sizing:border-box}

body{
    font-family: "Segoe UI", -apple-system, sans-serif;
    background: radial-gradient(circle at top,#1a1a2e,#0f172a 70%);
    color:white;
    padding:40px;
}

/* HEADER */
h1{
    text-align:center;
    font-weight:600;
    letter-spacing:1px;
    margin-bottom:30px;
}

/* INPUT BAR */
.topbar{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    padding:15px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

input,select,button{
    padding:10px 14px;
    margin:6px;
    border:none;
    border-radius:14px;
    font-size:14px;
}

input,select{
    background: rgba(255,255,255,0.15);
    color:white;
}

button{
    background: linear-gradient(135deg,#00e0ff,#4c7dff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #00e0ff;
}

/* LIST GRID */
#lists{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    margin-top:40px;
    justify-content:center;
}

/* GLASS CARD */
.list{
    width:270px;
    padding:20px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.15),
        0 15px 40px rgba(0,0,0,0.5);
    transition:.4s;
}
.list:hover{
    transform: translateY(-8px) scale(1.03);
}

/* SHAPES */
.square{border-radius:0}
.rounded{border-radius:30px}
.circle{border-radius:50%}
.triangle{clip-path: polygon(50% 0%,0% 100%,100% 100%)}

/* ITEMS */
.item{
    margin-top:12px;
    padding:10px;
    border-radius:15px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
}

textarea{
    width:100%;
    height:45px;
    border:none;
    border-radius:10px;
    background: rgba(255,255,255,0.2);
    color:white;
    padding:6px;
    margin-top:5px;
}

.smallBtn{
    font-size:11px;
    padding:5px 8px;
    margin-top:6px;
}

.deleteBtn{
    background: linear-gradient(135deg,#ff4d6d,#ff1e56);
}

</style>
</head>

<body>

<h1>🚀 Futuristic Checklist</h1>

<div class="topbar">
<input id="listName" placeholder="Naam checklist">
<select id="shape">
<option value="rounded">Rounded</option>
<option value="square">Square</option>
<option value="circle">Circle</option>
<option value="triangle">Triangle</option>
</select>
<input type="color" id="color">
<button onclick="addList()">➕ Add</button>
</div>

<div id="lists"></div>

<script>
let lists = JSON.parse(localStorage.getItem("checklists")) || [];

function save(){localStorage.setItem("checklists",JSON.stringify(lists));}

function addList(){
let name=document.getElementById("listName").value;
let shape=document.getElementById("shape").value;
let color=document.getElementById("color").value;
if(name==="")return alert("Naam?");
lists.push({name,shape,color,items:[]});
save(); render();
}

function editList(i){
let n=prompt("Nieuwe naam:",lists[i].name);
if(n){lists[i].name=n; save(); render();}
}
function deleteList(i){
if(confirm("Delete?")){lists.splice(i,1); save(); render();}
}

function addItem(i){
let t=prompt("Wat checken?");
if(!t)return;
lists[i].items.push({text:t,note:"",done:false});
save(); render();
}
function deleteItem(li,ii){
lists[li].items.splice(ii,1); save(); render();
}
function toggleCheck(li,ii){
lists[li].items[ii].done=!lists[li].items[ii].done; save();
}
function updateNote(li,ii,val){
lists[li].items[ii].note=val; save();
}

function render(){
let c=document.getElementById("lists"); c.innerHTML="";
lists.forEach((list,i)=>{
let div=document.createElement("div");
div.className="list "+list.shape;
div.style.border="1px solid "+list.color;
div.style.boxShadow="0 0 25px "+list.color+"55";

div.innerHTML=`
<h3>${list.name}</h3>
<button class="smallBtn" onclick="addItem(${i})">+Item</button>
<button class="smallBtn" onclick="editList(${i})">Edit</button>
<button class="smallBtn deleteBtn" onclick="deleteList(${i})">Delete</button>
`;

list.items.forEach((item,j)=>{
let d=document.createElement("div");
d.className="item";
d.innerHTML=`
<input type="checkbox" ${item.done?"checked":""}
onchange="toggleCheck(${i},${j})"> ${item.text}
<textarea placeholder="Opmerking..."
oninput="updateNote(${i},${j},this.value)">${item.note}</textarea>
<button class="smallBtn deleteBtn"
onclick="deleteItem(${i},${j})">Remove</button>`;
div.appendChild(d);
});

c.appendChild(div);
});
}
render();
</script>

</body>
</html>
