<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Futuristic Checklist</title>

<style>
*{box-sizing:border-box}
body{
    font-family:"Segoe UI",-apple-system,sans-serif;
    background: radial-gradient(circle at top,#1a1a2e,#0f172a 70%);
    color:white;padding:40px;
}
h1{text-align:center;margin-bottom:30px}

.topbar{
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    padding:15px;border-radius:20px;
    display:flex;justify-content:center;
}
button{
    padding:10px 16px;border:none;border-radius:14px;
    background:linear-gradient(135deg,#00e0ff,#4c7dff);
    color:white;cursor:pointer;font-weight:600;
}
.deleteBtn{background:linear-gradient(135deg,#ff4d6d,#ff1e56)}

#lists{display:flex;flex-wrap:wrap;gap:30px;margin-top:40px;justify-content:center}

.list{
    width:270px;padding:20px;
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius:30px;
}

.progress{height:8px;background:#ffffff22;border-radius:10px;margin:10px 0}
.progressFill{height:100%;background:linear-gradient(90deg,#00e0ff,#4c7dff);border-radius:10px}

.item{background:#ffffff22;padding:10px;border-radius:15px;margin-top:12px}

.check{
appearance:none;width:18px;height:18px;border:2px solid #00e0ff;border-radius:5px;margin-right:6px;
}
.check:checked{background:#00e0ff;box-shadow:0 0 10px #00e0ff}
.check:checked::after{content:"✓";color:black;font-weight:bold}

textarea{width:100%;height:45px;margin-top:5px;background:#ffffff22;color:white}

/* POPUP */
.popupBg{
position:fixed;inset:0;background:#0009;
display:none;align-items:center;justify-content:center;
}
.popup{
background:#0f172a;padding:25px;border-radius:25px;
box-shadow:0 0 40px #00e0ff55;
min-width:260px;text-align:center;
}
.popup input{
width:100%;padding:10px;margin:10px 0;
background:#ffffff22;border:none;border-radius:12px;color:white;
}
.smallBtn{font-size:12px;padding:6px 10px;margin:3px}
</style>
</head>

<body>

<h1>🚀 Futuristic Checklist</h1>

<div class="topbar">
<button onclick="newListPopup()">➕ New Checklist</button>
</div>

<div id="lists"></div>

<div class="popupBg" id="popupBg">
   <div class="popup" id="popup"></div>
</div>

<script>
let lists=JSON.parse(localStorage.getItem("checklists"))||[];
let popupBg=document.getElementById("popupBg");
let popup=document.getElementById("popup");
let typingState=null;

function save(){localStorage.setItem("checklists",JSON.stringify(lists));}

/* AUTO REFRESH */
function saveTypingState(){
let el=document.activeElement;
if(el.tagName==="TEXTAREA"){
typingState={value:el.value,start:el.selectionStart,end:el.selectionEnd,id:el.id};
}}
function restoreTypingState(){
if(!typingState)return;
let el=document.getElementById(typingState.id);
if(!el)return;
el.value=typingState.value;
el.focus();
el.setSelectionRange(typingState.start,typingState.end);
}
setInterval(()=>{
saveTypingState();
lists=JSON.parse(localStorage.getItem("checklists"))||[];
render();
restoreTypingState();
},60000);

/* POPUP */
function popupOpen(html){
popup.innerHTML=html;
popupBg.style.display="flex";
}
function closePopup(){popupBg.style.display="none";}

/* LIST FUNCTIES */
function newListPopup(){
popupOpen(`
<h3>Nieuwe Checklist</h3>
<input id="pName" placeholder="Naam van checklist">
<button onclick="createList()">Create</button>
<button onclick="closePopup()">Cancel</button>
`);
}
function createList(){
let name=document.getElementById("pName").value;
if(!name)return;
lists.push({name,items:[]});
save(); closePopup(); render();
}
function editList(i){
popupOpen(`
<h3>Bewerk naam</h3>
<input id="editName" value="${lists[i].name}">
<button onclick="saveEdit(${i})">Save</button>
`);
}
function saveEdit(i){
lists[i].name=document.getElementById("editName").value;
save(); closePopup(); render();
}
function deleteList(i){
if(confirm("Checklist verwijderen?")){
lists.splice(i,1); save(); render();
}}

/* ITEMS */
function addItem(i){
popupOpen(`
<h3>Nieuw item</h3>
<input id="itemText" placeholder="Wat checken?">
<button onclick="createItem(${i})">Add</button>
`);
}
function createItem(i){
let t=document.getElementById("itemText").value;
lists[i].items.push({text:t,note:"",done:false});
save(); closePopup(); render();
}
function deleteItem(li,ii){lists[li].items.splice(ii,1); save(); render();}
function toggleCheck(li,ii){lists[li].items[ii].done=!lists[li].items[ii].done; save(); render();}

/* RENDER */
function render(){
let c=document.getElementById("lists"); c.innerHTML="";
lists.forEach((list,i)=>{
let done=list.items.filter(x=>x.done).length;
let percent=list.items.length?Math.round(done/list.items.length*100):0;

let div=document.createElement("div");
div.className="list";
div.innerHTML=`
<h3>${list.name}</h3>
<div class="progress"><div class="progressFill" style="width:${percent}%"></div></div>
${percent}% klaar<br>
<button class="smallBtn" onclick="addItem(${i})">+Item</button>
<button class="smallBtn" onclick="editList(${i})">Edit</button>
<button class="smallBtn deleteBtn" onclick="deleteList(${i})">Delete</button>
`;

list.items.forEach((item,j)=>{
let d=document.createElement("div");
d.className="item";
let id=`note_${i}_${j}`;
d.innerHTML=`
<input type="checkbox" class="check" ${item.done?"checked":""}
onchange="toggleCheck(${i},${j})"> ${item.text}
<textarea id="${id}" oninput="lists[${i}].items[${j}].note=this.value;save();">${item.note}</textarea>
<button class="smallBtn deleteBtn" onclick="deleteItem(${i},${j})">Remove</button>
`;
div.appendChild(d);
});
c.appendChild(div);
});
}
render();
</script>

</body>
</html>
