<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Lobby</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <div class="card">
    <h2>Lobby maken</h2>
    <input id="lobbyName" placeholder="Lobby naam">
    <input id="maxPlayers" type="number" value="4">
    <button id="createLobby" class="primary">Maak lobby</button>
  </div>

  <div class="card">
    <h2>Lobby joinen</h2>
    <input id="lobbyIdInput" placeholder="Lobby ID">
    <button id="joinLobby" class="secondary">Join lobby</button>
  </div>

</div>

<script type="module" src="js/lobby.js"></script>
</body>
</html>
